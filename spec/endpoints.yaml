# spec/endpoints.yaml
# krxon — KRX Open API Endpoint Specification
# This file is the Source of Truth for CLI fetch, Python SDK, and TypeScript SDK.

version: "1.0"
base_url: "https://data-dbg.krx.co.kr/svc/apis"

# ---------------------------------------------------------------------------
# 공통 주의사항
# ---------------------------------------------------------------------------
notes:
  http_method: "POST"
  content_type: "application/json"
  auth_header: "AUTH_KEY"
  auth_description: "API 키를 AUTH_KEY HTTP 헤더로 전송"
  response_root_key: "OutBlock_1"
  response_root_description: "모든 응답은 OutBlock_1 배열을 루트로 반환"
  date_format: "YYYYMMDD"
  date_description: "basDd는 영업일(business day)만 유효. 공휴일/주말은 빈 데이터 또는 에러 반환"
  field_types: "모든 응답 필드는 string 타입으로 반환 (숫자 포함). 숫자 필드에 콤마(,)가 포함될 수 있음"
  rate_limit: 10000
  rate_limit_description: "AUTH_KEY당 일일 10,000건 호출 제한. 초과 시 HTTP 429 반환"
  data_update_time: "전일 데이터는 익영업일 08:00(KST)에 업데이트"
  isin_omit_warning: "isinCd 생략 시 전체 종목 데이터 반환 — 파생상품의 경우 대용량 페이로드 주의"
  subscription_notice: "각 엔드포인트는 openapi.krx.co.kr에서 별도 서비스 신청 필요"

# ---------------------------------------------------------------------------
# Python / TypeScript 메서드명 매핑
# ---------------------------------------------------------------------------
method_mapping:
  index.krx_daily:
    python: "get_krx_index_daily"
    typescript: "getKrxIndexDaily"
  index.kospi_daily:
    python: "get_kospi_index_daily"
    typescript: "getKospiIndexDaily"
  index.kosdaq_daily:
    python: "get_kosdaq_index_daily"
    typescript: "getKosdaqIndexDaily"
  index.derivatives_daily:
    python: "get_derivatives_index_daily"
    typescript: "getDerivativesIndexDaily"

  stock.kospi_daily:
    python: "get_kospi_stock_daily"
    typescript: "getKospiStockDaily"
  stock.kosdaq_daily:
    python: "get_kosdaq_stock_daily"
    typescript: "getKosdaqStockDaily"
  stock.kospi_info:
    python: "get_kospi_stock_info"
    typescript: "getKospiStockInfo"
  stock.kosdaq_info:
    python: "get_kosdaq_stock_info"
    typescript: "getKosdaqStockInfo"

  etp.etf_daily:
    python: "get_etf_daily"
    typescript: "getEtfDaily"
  etp.etn_daily:
    python: "get_etn_daily"
    typescript: "getEtnDaily"

  derivatives.futures_daily:
    python: "get_futures_daily"
    typescript: "getFuturesDaily"
  derivatives.stock_futures_kospi_daily:
    python: "get_stock_futures_kospi_daily"
    typescript: "getStockFuturesKospiDaily"
  derivatives.stock_futures_kosdaq_daily:
    python: "get_stock_futures_kosdaq_daily"
    typescript: "getStockFuturesKosdaqDaily"
  derivatives.options_daily:
    python: "get_options_daily"
    typescript: "getOptionsDaily"
  derivatives.stock_options_kospi_daily:
    python: "get_stock_options_kospi_daily"
    typescript: "getStockOptionsKospiDaily"
  derivatives.stock_options_kosdaq_daily:
    python: "get_stock_options_kosdaq_daily"
    typescript: "getStockOptionsKosdaqDaily"

