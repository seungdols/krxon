<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRX Open API Documentation</title>
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#252830;--bd:#2e3140;--t:#e4e6eb;--tm:#8b8fa3;--a:#6c8aff;--g:#4ade80;--o:#fb923c;--r:#f87171}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t);line-height:1.6}
a{color:var(--a);text-decoration:none}
.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;background:var(--bg2);border-right:1px solid var(--bd);overflow-y:auto;padding:16px 0;z-index:100}
.main{margin-left:260px;padding:32px 48px;max-width:900px}
.sidebar h1{font-size:17px;padding:0 16px 12px;border-bottom:1px solid var(--bd)}
.sidebar input{width:calc(100% - 32px);margin:12px 16px;padding:7px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--t);font-size:12px;outline:none}
.sidebar input:focus{border-color:var(--a)}
.ng{padding:6px 0}
.ng-t{padding:4px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tm)}
.ni{display:block;padding:3px 16px 3px 24px;font-size:12px;color:var(--tm);cursor:pointer}
.ni:hover{color:var(--t);background:rgba(108,138,255,.08)}
.ni.active{color:var(--a);background:rgba(108,138,255,.12);border-right:2px solid var(--a)}
.hero h2{font-size:28px;font-weight:700;margin-bottom:8px}
.hero p{color:var(--tm);font-size:14px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0 40px}
.ic{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:12px}
.ic h4{font-size:11px;color:var(--tm);text-transform:uppercase;margin-bottom:4px}
.ic code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-size:12px}
.cb{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:14px;font-family:'SF Mono',Monaco,monospace;font-size:12px;overflow-x:auto;margin:10px 0;line-height:1.7;white-space:pre}
.ep{margin-bottom:48px;scroll-margin-top:20px}
.ep.hidden{display:none}
.cat.hidden{display:none}
.ct{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;margin-bottom:8px}
.ep h3{font-size:18px;font-weight:600;margin-bottom:6px}
.ep-h{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.mb{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px;background:rgba(251,146,60,.15);color:var(--o)}
.ep-p{font-family:'SF Mono',Monaco,monospace;font-size:13px}
.ep-d{color:var(--tm);font-size:13px;margin-bottom:14px}
.ps{margin-bottom:14px}
.ps h4{font-size:11px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:12px;background:var(--bg2);border-radius:6px;overflow:hidden;border:1px solid var(--bd)}
th{background:var(--bg3);padding:6px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;color:var(--tm)}
td{padding:5px 10px;border-top:1px solid var(--bd)}
td code{background:var(--bg3);padding:0 4px;border-radius:2px;font-size:11px;font-family:'SF Mono',Monaco,monospace}
.rq{color:var(--r);font-size:9px;font-weight:600}
.ts{color:var(--g);font-size:10px}
.ti{color:var(--o);font-size:10px}
.ch{font-size:24px;font-weight:700;margin-bottom:6px;padding-bottom:8px;border-bottom:2px solid var(--bd)}
.cd{color:var(--tm);margin-bottom:24px;font-size:13px}
hr{border:none;border-top:1px solid var(--bd);margin:40px 0}
@media(max-width:800px){.sidebar{display:none}.main{margin-left:0;padding:16px}.ig{grid-template-columns:1fr}}
</style>
</head>

</nav>

function parseRes(str) {
  return str.split(',').map(s => {
    const [fd, rest] = s.split(':');
    const parts = rest.split('|');
    return { field: fd, desc: parts[0], type: parts[1] || 'string' };
  });
}

  let h = '<div class="ng"><div class="ng-t">Overview</div><a class="ni" href="#overview">Getting Started</a></div>';
  CATS.forEach(c => {
    const eps = E.filter(e => e.cat === c.id);
    h += `<div class="ng"><div class="ng-t" style="color:${c.color}">${c.name} (${eps.length})</div>`;
    eps.forEach(e => { h += `<a class="ni" href="#${e.id}">${e.nav}</a>`; });
    h += '</div>';
  });
  document.getElementById('nav').innerHTML = h;
}

function filter(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.ep[data-search]').forEach(el => {
    const s = (el.dataset.search||'') + ' ' + el.textContent;
    el.classList.toggle('hidden', q && !s.toLowerCase().includes(q));
  });
  document.querySelectorAll('.cat').forEach(c => {
    const vis = c.querySelectorAll('.ep:not(.hidden)');
    c.classList.toggle('hidden', q && vis.length === 0);
  });
}

// Active nav highlight
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
      const l = document.querySelector(`.ni[href="#${e.target.id}"]`);
      if (l) l.classList.add('active');
    }
  });
}, { rootMargin: '-20% 0px -70% 0px' });

document.querySelectorAll('.ep[id]').forEach(s => obs.observe(s));
