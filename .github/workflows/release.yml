name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  # -------------------------------------------------------------------
  # Job 1: Validate tag matches Cargo.toml version
  # -------------------------------------------------------------------
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------
  # Job 2: Run full test suite
  # -------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: "1.94.0"
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lint
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  # -------------------------------------------------------------------
  # Job 3: Build Rust binary + generate SDKs
  # -------------------------------------------------------------------
  build:
    name: Build & Generate SDKs
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: "1.94.0"

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Generate Python SDK
        run: ./target/release/krxon generate python --out /tmp/sdk-python

      - name: Generate TypeScript SDK
        run: ./target/release/krxon generate typescript --out /tmp/sdk-typescript

      - name: Upload Python SDK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-sdk
          path: /tmp/sdk-python/krx/

      - name: Upload TypeScript SDK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: typescript-sdk
          path: /tmp/sdk-typescript/krx/

      - name: Upload release binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: krxon-linux-amd64
          path: target/release/krxon

  # -------------------------------------------------------------------
  # Job 4: Publish to crates.io
  # -------------------------------------------------------------------
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate, build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: "1.94.0"

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # -------------------------------------------------------------------
  # Job 5: Publish Python SDK to PyPI
  # -------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate, build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Python SDK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-sdk
          path: /tmp/pypi-build/krx/

      - name: Prepare Python package
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cp sdk/python/pyproject.toml /tmp/pypi-build/pyproject.toml
          sed -i "s/^version = .*/version = \"$VERSION\"/" /tmp/pypi-build/pyproject.toml
          cp README.md /tmp/pypi-build/README.md

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Build package
        working-directory: /tmp/pypi-build
        run: uv build

      - name: Publish to PyPI
        working-directory: /tmp/pypi-build
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # -------------------------------------------------------------------
  # Job 6: Publish TypeScript SDK to npm
  # -------------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate, build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download TypeScript SDK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: typescript-sdk
          path: /tmp/npm-build/

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Patch version in package.json
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cd /tmp/npm-build
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Install dependencies & build
        working-directory: /tmp/npm-build
        run: |
          npm install
          npm run build

      - name: Publish to npm
        working-directory: /tmp/npm-build
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # -------------------------------------------------------------------
  # Job 7: Create GitHub Release
  # -------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build, publish-crates, publish-pypi, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download release binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: krxon-linux-amd64
          path: /tmp/release/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release v$VERSION" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            /tmp/release/krxon
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
